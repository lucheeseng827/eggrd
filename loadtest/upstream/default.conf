# Stub upstream for the load test: an nginx that answers every path with a tiny static 200,
# as fast as nginx can. The point is to make EdgeGuard the bottleneck under test — a heavy
# upstream would mask the proxy's own overhead. `access_log off` keeps nginx from being I/O
# bound on logging at high RPS.

server {
    listen 80 default_server;
    access_log off;

    # A fixed small body for every path/method (so attack-shaped WAF probes also get a backend).
    location / {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Distinct cheap endpoint the EdgeGuard readiness probe / k6 warmup can hit.
    location = /healthz {
        default_type text/plain;
        return 200 "healthy\n";
    }
}
