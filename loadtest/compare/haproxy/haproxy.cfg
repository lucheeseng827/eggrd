# Competitor baseline: HAProxy as a pure reverse proxy to the SAME upstream.
# Raw-throughput reference (the C-tier ceiling). No auth/limit/rewrite — passthrough only.
# No `log` directive == logging off, matching EdgeGuard's RUST_LOG=warn. http-keep-alive and
# a generous maxconn mirror the pooled, multi-core posture of the EdgeGuard baseline.

global
    maxconn 60000

defaults
    mode http
    option http-keep-alive
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend fe
    bind *:8080
    default_backend be

backend be
    server s1 upstream:80 maxconn 60000
