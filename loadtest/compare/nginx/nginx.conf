# Competitor baseline: nginx as a pure reverse proxy to the SAME upstream EdgeGuard uses.
# No auth, no rate limit, no header rewriting — passthrough only, so this measures nginx's
# intrinsic proxy tax against EdgeGuard's baseline on identical hardware/topology.
#
# Fairness knobs matched to EdgeGuard's baseline:
#   - worker_processes auto      -> use all cores (EdgeGuard tokio is multi-threaded)
#   - access_log off             -> matches RUST_LOG=warn (logging is not the bottleneck)
#   - keepalive to the upstream  -> matches hyper-util's pooled upstream client

worker_processes auto;
events { worker_connections 16384; }

http {
    access_log off;

    upstream backend {
        server upstream:80;
        keepalive 64;
    }

    server {
        listen 8080 default_server;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
